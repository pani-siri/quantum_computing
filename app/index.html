
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
      .font-mono-code { font-family: 'JetBrains Mono', monospace; }
      
      @keyframes pulse-subtle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
      .animate-pulse-subtle { animation: pulse-subtle 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      
      /* Custom scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }

      /* Enhanced Academic Content Layout */
      .academic-content {
        line-height: 1.75;
        color: #334155;
      }
      .academic-content h1 {
        font-size: 2.5rem;
        font-weight: 900;
        color: #0f172a;
        margin-top: 3rem;
        margin-bottom: 1.5rem;
        letter-spacing: -0.04em;
        line-height: 1.1;
      }
      .academic-content h2 {
        font-size: 1.875rem;
        font-weight: 800;
        color: #1e293b;
        margin-top: 2.5rem;
        margin-bottom: 1.25rem;
        letter-spacing: -0.02em;
      }
      .academic-content h3 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #334155;
        margin-top: 2rem;
        margin-bottom: 1rem;
      }
      .academic-content p {
        margin-bottom: 1.25rem;
      }
      .academic-content ul {
        margin-bottom: 1.5rem;
        padding-left: 1.5rem;
      }
      .academic-content li {
        margin-bottom: 0.75rem;
        list-style-type: none;
        position: relative;
      }
      .academic-content li::before {
        content: "•";
        color: #6366f1;
        font-weight: bold;
        position: absolute;
        left: -1.25rem;
      }
      .academic-content strong {
        color: #4338ca;
        font-weight: 700;
      }
      /* Code Block Styling */
      .academic-content pre {
        background: #0f172a;
        color: #e2e8f0;
        padding: 1.5rem;
        border-radius: 1rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.875rem;
        overflow-x: auto;
        margin: 1.5rem 0;
        border: 1px solid #1e293b;
        box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
      }
      .academic-content code:not(pre code) {
        background: #f1f5f9;
        color: #ef4444;
        padding: 0.2rem 0.4rem;
        border-radius: 0.4rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9em;
      }
    </style>
<script type="importmap">
{
  "imports": {

    "react-dom": "https://esm.sh/react-dom@^19.2.3",

    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "path": "https://esm.sh/path@^0.12.7",
    "d3": "https://esm.sh/d3@^7.9.0"
  }
}
</script>

</head>

</html>
